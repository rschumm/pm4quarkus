name: CI for Quarkus Proposals App 

permissions:
  contents: write

on:
  # Uncomment the following lines to enable the workflow on push and pull request events for the main branch
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: PM4 Checkout code
      uses: actions/checkout@v4

    - name: PM4 Set up JDK 
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin' 
        cache: 'maven'

    - name: PM4 Set up Docker Build
      uses: docker/setup-buildx-action@v3

    - name: PM4 Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /var/lib/docker
        key: docker-cache-${{ runner.os }}-${{ github.ref }}
        restore-keys: |
          docker-cache-${{ runner.os }}-

    - name: PM4 Enable Testcontainers Reuse
      run: echo "testcontainers.reuse.enable=true" > ~/.testcontainers.properties

    - name: PM4 Run tests with Maven
      run: mvn package

    - name: PM4 Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: target/

    - name: PM4 Upload Dockerfiles
      uses: actions/upload-artifact@v4
      with:
        name: dockerfiles
        path: src/main/docker/

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: PM4 Checkout code
      uses: actions/checkout@v4

    - name: PM4 Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: target

    - name: PM4 Download Dockerfiles
      uses: actions/download-artifact@v4
      with:
        name: dockerfiles
        path: src/main/docker

    - name: PM4 Set up Docker Build
      uses: docker/setup-buildx-action@v3

    - name: PM4 Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        # this is a personal access token with read:packages and write:packages permissions, stored as a secret in the repository settings
        password: ${{ secrets.PM4_REGISTRY }}

    - name: PM4 Build and push Docker image
      run: |
        docker build -f src/main/docker/Dockerfile.jvm -t ghcr.io/${{ github.repository }}/helloquarkus:latest .
        docker push ghcr.io/${{ github.repository }}/helloquarkus:latest

    - name: PM4 Update deployment redeploy annotations
      run: |
        BUILD_SHA="${GITHUB_SHA}"
        REDEPLOY_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

        sed -i "s|ci/build-sha: .*|ci/build-sha: \"${BUILD_SHA}\"|" operations/Deployment.yaml
        sed -i "s|ci/redeploy-at: .*|ci/redeploy-at: \"${REDEPLOY_AT}\"|" operations/Deployment.yaml

    - name: PM4 Commit deployment metadata for ArgoCD
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "scmy@zhaw.ch"

        git add operations/Deployment.yaml
        if git diff --cached --quiet; then
          echo "No deployment metadata changes to commit"
          exit 0
        fi

        git commit -m "ci: update redeploy metadata for ${GITHUB_SHA::7}"
        git push origin HEAD:${GITHUB_REF_NAME}



